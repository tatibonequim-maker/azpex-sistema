<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azpex · Bonequim</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4f0; --sf: #fff; --s2: #f8f7f3; --bd: #e0dfd8; --bd2: #cccbc4;
            --tx: #1a1a1a; --mt: #888780; --ac: #0C4D53; --al: #E1F5EE; --wpp: #25D366;
            --c1: #EF9F27; --b1: #FAEEDA; --c2: #378ADD; --b2: #E6F1FB;
            --c3: #1D9E75; --b3: #E1F5EE; --c4: #E24B4A; --b4: #FCEBEB;
            --c5: #7B5EA7; --b5: #EEEDFE; --c6: #D4537E; --b6: #FBEAF0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--tx); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- PORTAL & LOGIN --- */
        .portal, .login { position: fixed; inset: 0; background: var(--bg); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lbox { background: var(--sf); border: .5px solid var(--bd); border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .portal-logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--ac); margin-bottom: 20px; }
        .portal-btn { width: 100%; padding: 16px; border-radius: 12px; border: .5px solid var(--bd); background: var(--sf); cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; transition: 0.2s; }
        .portal-btn:hover { border-color: var(--ac); background: var(--al); }
        
        .pin-area { display: none; flex-direction: column; align-items: center; gap: 10px; }
        .pdots { display: flex; gap: 12px; margin: 10px 0; }
        .pdot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--bd); }
        .pdot.on { background: var(--ac); border-color: var(--ac); }
        .ppad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .pk { padding: 15px; border-radius: 10px; border: none; background: var(--s2); font-size: 1.2rem; font-weight: 600; cursor: pointer; }
        .pk:active { background: var(--bd); }

        /* --- LAYOUT --- */
        .hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--sf); border-bottom: .5px solid var(--bd); sticky: top; z-index: 100; }
        .board { display: flex; gap: 15px; padding: 15px; overflow-x: auto; align-items: flex-start; height: calc(100vh - 120px); }
        .col { background: #ebede9; border-radius: 12px; min-width: 280px; max-width: 280px; display: flex; flex-direction: column; max-height: 100%; }
        .col-hd { padding: 12px; display: flex; justify-content: space-between; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 800; color: var(--ac); border-bottom: 2px solid rgba(0,0,0,0.05); }
        .col-bd { padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* --- CARDS --- */
        .card { background: var(--sf); border-radius: 10px; padding: 12px; border: 0.5px solid var(--bd); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .cref { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--ac); font-size: 0.9rem; }
        .cid { font-size: 0.65rem; color: var(--mt); font-family: 'DM Mono'; }
        .cnome { font-weight: 700; font-size: 0.85rem; margin: 4px 0; text-transform: uppercase; }
        
        /* Estilo Encaixe (O seu campo Taty) */
        .card-e { border: 1.5px solid var(--ac); }
        .ef { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
        .el { font-size: 0.6rem; text-transform: uppercase; color: var(--mt); font-weight: 600; }
        .ei { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--bd); font-family: 'DM Mono'; font-weight: 600; text-align: center; outline: none; }
        .ei:focus { border-color: var(--ac); background: var(--al); }
        .ebtn { width: 100%; padding: 10px; border-radius: 8px; background: var(--ac); color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 8px; }

        /* Toasts */
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: var(--ac); color: white; border-radius: 8px; display: none; z-index: 1000; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="portal" class="portal">
        <div class="lbox">
            <div class="portal-logo">Azpex · Bonequim</div>
            <button class="portal-btn" onclick="openLogin('Cinthia / Taty')">🏭 Fábrica - Cinthia/Taty</button>
            <button class="portal-btn" onclick="openLogin('Rosana')">🧵 Fábrica - Rosana</button>
            <button class="portal-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div id="login" class="login" style="display:none">
        <div class="lbox">
            <div id="login-user" style="font-weight: 700; margin-bottom: 10px;"></div>
            <div class="pin-area" style="display:flex">
                <div class="pdots">
                    <div class="pdot" id="dot0"></div>
                    <div class="pdot" id="dot1"></div>
                    <div class="pdot" id="dot2"></div>
                    <div class="pdot" id="dot3"></div>
                </div>
                <div class="ppad">
                    <button class="pk" onclick="pressKey('1')">1</button>
                    <button class="pk" onclick="pressKey('2')">2</button>
                    <button class="pk" onclick="pressKey('3')">3</button>
                    <button class="pk" onclick="pressKey('4')">4</button>
                    <button class="pk" onclick="pressKey('5')">5</button>
                    <button class="pk" onclick="pressKey('6')">6</button>
                    <button class="pk" onclick="pressKey('7')">7</button>
                    <button class="pk" onclick="pressKey('8')">8</button>
                    <button class="pk" onclick="pressKey('9')">9</button>
                    <button class="pk" onclick="pressKey('C')">C</button>
                    <button class="pk" onclick="pressKey('0')">0</button>
                    <button class="pk" onclick="backPortal()">⬅</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" style="display:none">
        <div class="hdr">
            <div style="font-family: 'Syne'; font-weight: 800; color: var(--ac)">Azpex</div>
            <div id="user-display" style="font-size: 0.8rem; background: var(--al); padding: 4px 12px; border-radius: 20px;"></div>
            <button onclick="logout()" style="background:none; border:none; color:var(--c4); cursor:pointer; font-weight:600">Sair</button>
        </div>

        <div class="board" id="board">
            </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- DADOS MOCK (Simulando o Banco de Dados) ---
        let database = [
            { id: '160', ref: '2959', nome: 'VESTIDO LONGO CANELADO', status: 'encaixe', comp: '', aprov: '' },
            { id: '430', ref: '2868', nome: 'VESTIDO VALÉRIA MONTARIA', status: 'aprovacao', comp: '4.5', aprov: '83.3' },
            { id: '004', ref: '2934', nome: 'VESTIDO JADE UM OMBRO', status: 'cores', comp: '3.2', aprov: '77' }
        ];

        let currentUser = "";
        let currentPin = "";

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function openLogin(user) {
            currentUser = user;
            document.getElementById('portal').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
            document.getElementById('login-user').innerText = user;
            currentPin = "";
            updateDots();
        }

        function backPortal() {
            document.getElementById('portal').style.display = 'flex';
            document.getElementById('login').style.display = 'none';
        }

        function pressKey(k) {
            if (k === 'C') { currentPin = ""; }
            else if (currentPin.length < 4) { currentPin += k; }
            
            updateDots();

            if (currentPin.length === 4) {
                // PIN Simples para teste: 1234
                if (currentPin === "1234") {
                    loginSuccess();
                } else {
                    alert("PIN Incorreto (Tente 1234)");
                    currentPin = "";
                    updateDots();
                }
            }
        }

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                document.getElementById(`dot${i}`).className = i < currentPin.length ? 'pdot on' : 'pdot';
            }
        }

        function loginSuccess() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-display').innerText = currentUser;
            render();
        }

        function logout() {
            location.reload();
        }

        // --- LÓGICA DO BOARD (AQUI ESTÁ O QUE VOCÊ PRECISAVA) ---

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const colunas = [
                { id: 'encaixe', titulo: 'AG. ENCAIXE' },
                { id: 'aprovacao', titulo: 'AG. APROVAÇÃO' },
                { id: 'cores', titulo: 'DEFINIR CORES' }
            ];

            colunas.forEach(col => {
                let html = `
                    <div class="col">
                        <div class="col-hd"><span>${col.titulo}</span><span>${database.filter(i => i.status === col.id).length}</span></div>
                        <div class="col-bd">
                `;

                database.filter(item => item.status === col.id).forEach(item => {
                    if (col.id === 'encaixe' && currentUser.includes('Taty')) {
                        // Card Especial de Edição para Taty
                        html += `
                            <div class="card card-e">
                                <div class="cref">${item.ref} <span class="cid">ID-${item.id}</span></div>
                                <div class="cnome">${item.nome}</div>
                                <div class="ef">
                                    <div><label class="el">Comprimento (M)</label><input type="number" id="comp-${item.id}" class="ei" value="${item.comp}"></div>
                                    <div><label class="el">Aproveitamento (%)</label><input type="number" id="aprov-${item.id}" class="ei" value="${item.aprov}"></div>
                                </div>
                                <button class="ebtn" onclick="salvarEncaixe('${item.id}')">Salvar e aprovar encaixe ✓</button>
                            </div>
                        `;
                    } else {
                        // Card Padrão de Visualização
                        html += `
                            <div class="card">
                                <div class="cref">${item.ref} <span class="cid">ID-${item.id}</span></div>
                                <div class="cnome">${item.nome}</div>
                                <div style="font-size:0.6rem; color:var(--mt); margin-top:5px">
                                    ${item.comp ? '📏 '+item.comp+'m' : ''} ${item.aprov ? ' | ✨ '+item.aprov+'%' : ''}
                                </div>
                            </div>
                        `;
                    }
                });

                html += `</div></div>`;
                board.innerHTML += html;
            });
        }

        // FUNÇÃO PARA MOVER O CARD
        function salvarEncaixe(id) {
            const comp = document.getElementById(`comp-${id}`).value;
            const aprov = document.getElementById(`aprov-${id}`).value;

            if (!comp || !aprov) {
                showToast("⚠️ Taty, preencha o comprimento e aproveitamento!");
                return;
            }

            // Atualiza no "Banco de Dados"
            const index = database.findIndex(i => i.id === id);
            database[index].comp = comp;
            database[index].aprov = aprov;
            database[index].status = 'aprovacao'; // MOVE PARA A PRÓXIMA COLUNA

            showToast("🚀 Encaixe salvo e enviado para Aprovação!");
            render(); // Recarrega a tela
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

    </script>
</body>
</html>
