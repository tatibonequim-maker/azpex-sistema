<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Azpex · Bonequim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--sf:#fff;--s2:#f8f7f3;--bd:#e0dfd8;--bd2:#cccbc4;
  --tx:#1a1a1a;--mt:#888780;--ac:#0C4D53;--al:#E1F5EE;--wpp:#25D366;
  --c1:#EF9F27;--b1:#FAEEDA;--c2:#378ADD;--b2:#E6F1FB;
  --c3:#1D9E75;--b3:#E1F5EE;--c4:#E24B4A;--b4:#FCEBEB;
  --c5:#7B5EA7;--b5:#EEEDFE;--c6:#D4537E;--b6:#FBEAF0;
  --c7:#0C4D53;--b7:#E1F5EE;--c8:#B8860B;--b8:#FFF8DC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif}

/* Estilos de Portal, Login, Header, Cards, etc. (Mantidos do original) */
.portal{position:fixed;inset:0;background:var(--bg);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.portal-box{width:100%;max-width:360px;text-align:center}
.portal-logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--ac);margin-bottom:4px}
.portal-sub{font-size:.82rem;color:var(--mt);margin-bottom:32px}
.portal-btns{display:flex;flex-direction:column;gap:12px}
.portal-btn{padding:18px;border-radius:14px;border:.5px solid var(--bd);background:var(--sf);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;transition:all .18s}
.portal-btn:hover{border-color:var(--ac);background:var(--al)}
.portal-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.portal-label{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.portal-desc{font-size:.76rem;color:var(--mt);margin-top:2px}

.login{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.login.open{display:flex}
.lbox{background:var(--sf);border:.5px solid var(--bd);border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center}
.pin-area{display:none;flex-direction:column;align-items:center;gap:7px;margin-top:12px}
.pin-area.show{display:flex}
.pdots{display:flex;gap:10px;margin:4px 0}
.pdot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;transition:all .15s}
.pdot.on{background:var(--ac);border-color:var(--ac)}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;width:100%}
.pk{padding:12px;border-radius:9px;border:.5px solid var(--bd);background:var(--s2);font-size:1rem;font-weight:500;cursor:pointer;transition:all .15s}
.pk.del{font-size:.78rem;color:var(--mt)}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:.5px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
.board{padding:16px;display:grid;gap:10px;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr))}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--sf);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:560px;max-height:93vh;overflow-y:auto}

/* Toast & UTILS */
.toasts{position:fixed;bottom:16px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--sf);border-radius:9px;padding:9px 13px;font-size:.78rem;box-shadow:0 4px 16px rgba(0,0,0,.1);border-left:3px solid var(--ac)}
.toast.s{border-left-color:#1D9E75}.toast.w{border-left-color:#EF9F27}
</style>
</head>
<body>

<div id="toasts" class="toasts"></div>

<div class="portal" id="portal">
  <div class="portal-box">
    <div class="portal-logo">Azpex · Bonequim</div>
    <div class="portal-sub">Selecione sua área</div>
    <div class="portal-btns">
      <button class="portal-btn" onclick="openLogin('fabrica')">
        <div class="portal-icon" style="background:#E1F5EE">🏭</div>
        <div><div class="portal-label">Fábrica</div><div class="portal-desc">Cortes e produção</div></div>
      </button>
      <button class="portal-btn" onclick="openLogin('loja')">
        <div class="portal-icon" style="background:#E6F1FB">🏪</div>
        <div><div class="portal-label">Loja Bonequim</div><div class="portal-desc">Pedidos e estoque</div></div>
      </button>
    </div>
  </div>
</div>

<div class="login" id="login-area">
  <div class="lbox">
    <div class="llogo" id="login-title">Login</div>
    <div class="lsub" id="lsub">Escolha o usuário</div>
    <div id="user-list" class="lusers"></div>
    <div class="pin-area" id="pin-area">
      <div class="pdots"><div class="pdot" id="dot0"></div><div class="pdot" id="dot1"></div><div class="pdot" id="dot2"></div><div class="pdot" id="dot3"></div></div>
      <div class="ppad" id="numpad"></div>
      <button class="pk" style="grid-column: span 3" onclick="backToUsers()">Voltar</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="hdr">
    <div class="hdr-logo">Azpex · Bonequim</div>
    <div id="user-tag" class="hdr-user"></div>
    <button class="hbtn out" onclick="logout()">Sair</button>
  </header>
  
  <div class="tb">
    <input type="text" class="srch" id="srch" placeholder="Buscar referência..." oninput="render()">
    <button class="hbtn hi" id="btn-sync" onclick="syncAll()">Sincronizar</button>
    <button class="hbtn hi" id="btn-novo" style="display:none">+ Novo</button>
  </div>

  <div class="board" id="board"></div>
</div>

<div class="ov" id="ov-pedido">
  <div class="modal">
    <div class="mhd"><div class="mti">Novo Pedido Bonequim</div><button onclick="cl('ov-pedido')">✕</button></div>
    <div class="fg2">
      <div class="fg"><label class="fl">Cód/Ref</label><input class="fi" id="p-cod"></div>
      <div class="fg"><label class="fl">Nome Item</label><input class="fi" id="p-nome"></div>
    </div>
    <div class="fg" style="margin-top:10px">
      <label class="fl">Grade</label>
      <select class="fsl" id="p-grade" onchange="buildPedidoGrade()"></select>
    </div>
    <div id="p-cores-area" style="margin-top:15px"></div>
    <button class="cfg-sv" onclick="salvarPedido()">Enviar Pedido</button>
  </div>
</div>

<script>
// ── CONFIGURAÇÕES ──
const DURL = 'https://script.google.com/macros/s/AKfycbxPBTjdEM04daObzVy7j1qV4qkQjn1-4WUav0mKMuvWp6v6O3YI1Pwjh0G2mdcF7GDh/exec';
const DPINS = { taty:'1234', edvaldo:'5678', rosana:'9012', carol:'2468', vendA:'1111' };
const GRADES_DEF = ['PP','P','M','G','GG','G1','G2','G3'];

let user = null, type = null, pinInput = '', curSelUser = null;
let cortes = [], pedidos = [], filtro = '';

// ── INICIALIZAÇÃO ──
function init(){
  const saved = localStorage.getItem('az_user');
  if(saved) {
    user = saved;
    type = localStorage.getItem('az_type');
    showApp();
  }
  buildNumpad();
}

function buildNumpad(){
  const pad = document.getElementById('numpad');
  for(let i=1; i<=9; i++) pad.innerHTML += `<button class="pk" onclick="ppk('${i}')">${i}</button>`;
  pad.innerHTML += `<div></div><button class="pk" onclick="ppk('0')">0</button><button class="pk del" onclick="ppdel()">⌫</button>`;
}

// ── LOGICA DE LOGIN ──
function openLogin(t){
  type = t;
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-area').classList.add('open');
  document.getElementById('login-title').textContent = t === 'fabrica' ? '🏭 Fábrica' : '🏪 Loja';
  
  const list = document.getElementById('user-list');
  list.innerHTML = '';
  const users = t === 'fabrica' ? ['taty','edvaldo','rosana'] : ['vendA','carol'];
  users.forEach(u => {
    list.innerHTML += `<button class="lu" onclick="selUser('${u}')"><div class="lav">${u[0].toUpperCase()}</div>${u}</button>`;
  });
}

function selUser(u){
  curSelUser = u;
  document.getElementById('user-list').style.display = 'none';
  document.getElementById('pin-area').classList.add('show');
}

function ppk(n){
  if(pinInput.length < 4) {
    pinInput += n;
    updateDots();
    if(pinInput.length === 4) checkPin();
  }
}

function ppdel(){ pinInput = pinInput.slice(0,-1); updateDots(); }
function updateDots(){ for(let i=0; i<4; i++) document.getElementById('dot'+i).className = i < pinInput.length ? 'pdot on' : 'pdot'; }

function checkPin(){
  if(DPINS[curSelUser] === pinInput){
    user = curSelUser;
    localStorage.setItem('az_user', user);
    localStorage.setItem('az_type', type);
    showApp();
  } else {
    toast('PIN Incorreto','w');
    pinInput = '';
    updateDots();
  }
}

function showApp(){
  document.getElementById('login-area').classList.remove('open');
  document.getElementById('portal').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-tag').textContent = user.toUpperCase();
  
  if(type === 'loja'){
    document.getElementById('btn-novo').style.display = 'block';
    document.getElementById('btn-novo').onclick = () => {
      op('ov-pedido');
      document.getElementById('p-grade').innerHTML = GRADES_DEF.map(g => `<option>${g}</option>`).join('');
    };
  }
  syncAll();
}

// ── API ──
async function syncAll(){
  toast('Sincronizando...');
  try {
    const r = await fetch(DURL + '?action=getData');
    const data = await r.json();
    cortes = data.cortes || [];
    pedidos = data.pedidos || [];
    render();
  } catch(e) { toast('Erro ao sincronizar','w'); }
}

// ── RENDER ──
function render(){
  const b = document.getElementById('board');
  const q = document.getElementById('srch').value.toLowerCase();
  b.innerHTML = '';

  const lista = type === 'fabrica' ? cortes : pedidos;
  
  lista.filter(x => (x.ref || x.cod || '').toLowerCase().includes(q)).forEach(x => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="cref">${x.ref || x.cod}</div>
      <div class="cnome">${x.nome || 'Sem nome'}</div>
      <div class="tag tg">${x.status || 'PENDENTE'}</div>
    `;
    b.appendChild(card);
  });
}

// ── PEDIDOS ──
function buildPedidoGrade(){
  const g = document.getElementById('p-grade').value;
  const area = document.getElementById('p-cores-area');
  area.innerHTML = `<div class="sl">Cores para ${g}</div>
    <div id="p-cores-list"></div>
    <button class="add-cor" onclick="addPedidoCorRow()">+ Adicionar Cor</button>`;
  addPedidoCorRow();
}

function addPedidoCorRow(){
  const div = document.createElement('div');
  div.className = 'cor-row';
  div.innerHTML = `<input class="cor-i" placeholder="Cor"> <input type="number" class="qtd-i" placeholder="Qtd">`;
  document.getElementById('p-cores-list').appendChild(div);
}

async function salvarPedido(){
  const dados = {
    cod: document.getElementById('p-cod').value,
    nome: document.getElementById('p-nome').value,
    grade: document.getElementById('p-grade').value,
    vendedor: user,
    data: new Date().toLocaleDateString(),
    status: 'SOLICITADO'
  };
  
  toast('Enviando...');
  // Aqui você chamaria o fetch POST para o seu Script
  cl('ov-pedido');
  toast('Pedido enviado com sucesso!', 's');
}

// ── UTILS ──
function op(id){ document.getElementById(id).classList.add('open'); }
function cl(id){ document.getElementById(id).classList.remove('open'); }
function toast(m,t='i'){
  const c = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = `toast ${t}`;
  d.textContent = m;
  c.appendChild(d);
  setTimeout(()=>d.remove(), 3000);
}
function logout(){ localStorage.clear(); location.reload(); }

window.onload = init;
</script>
</body>
</html>
